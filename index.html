<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CRITICAL: Prevent browser from caching stale HTML after deploy -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- App meta -->
    <meta name="description" content="Sutra ERP - Nepal's Cloud Accounting Solution" />
    <meta name="theme-color" content="#1557b0" />

    <title>Sutra ERP</title>

    <!-- Loading indicator shown before React mounts -->
    <style>
      #root-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f6fa;
        font-family: ui-sans-serif, system-ui, sans-serif;
        flex-direction: column;
        gap: 16px;
        z-index: 9999;
      }
      #root-loading .spinner {
        width: 40px; height: 40px;
        border: 4px solid #e5e7eb;
        border-top-color: #1557b0;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #root-loading .label {
        font-size: 14px;
        color: #6b7280;
        font-weight: 500;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script>
      // Suppress Alt key browser menu-bar focus so Alt+K etc. work in our app
      document.addEventListener('keydown', function(e) {
        if (e.altKey && !e.ctrlKey && !e.metaKey) {
          e.preventDefault();
        }
      }, { capture: true, passive: false });
    </script>
  </head>
  <body>
    <!-- Loading screen shown while React bundle downloads -->
    <div id="root-loading">
      <div class="spinner"></div>
      <div class="label">Loading Sutra ERP…</div>
    </div>

    <!-- React mounts here -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Hide loading screen once React root element has content
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loading = document.getElementById('root-loading');
          if (loading) {
            loading.style.opacity = '0';
            loading.style.transition = 'opacity 0.3s ease';
            setTimeout(() => loading.remove(), 300);
          }
          observer.disconnect();
        }
      });
      const rootEl = document.getElementById('root');
      if (rootEl) observer.observe(rootEl, { childList: true });
    </script>
  </body>
</html>

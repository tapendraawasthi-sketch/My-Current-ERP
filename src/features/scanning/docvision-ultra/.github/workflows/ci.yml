name: DocVision Ultra CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Build and Test
        run: ./gradlew :android-app:assembleDebug :shared:allTests lintDebug

  ios-build:
    name: iOS Build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.3.app/Contents/Developer
      - name: Cache derived data
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-deriveddata-${{ hashFiles('**/*.pbxproj') }}
      - name: Build iOS App
        run: |
          cd ios-app
          xcodebuild -project ios-app.xcodeproj -scheme ios-app -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' build

  cpp-tests:
    name: C++ Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libopencv-dev
      - name: Build and Test
        run: |
          mkdir build && cd build
          cmake -G Ninja ../docvision-core
          ninja
          ctest --output-on-failure

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ktlint and detekt
        run: ./gradlew ktlintCheck detekt
      - name: Run clang-tidy
        run: |
          sudo apt-get install -y clang-tidy
          find docvision-core -name "*.cpp" -o -name "*.h" | xargs clang-tidy -p build/

name: Model Conversion

on:
  push:
    branches: [ main ]
    paths:
      - 'ml-models/export/*.onnx'

jobs:
  convert:
    name: Convert Models
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch onnx tensorflow coremltools tflite
      - name: Run Conversion Scripts
        run: |
          cd ml-models/export
          python convert_to_tflite.py
          python convert_to_coreml.py
      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ml-models/export/*.tflite ml-models/export/*.mlpackage
          git commit -m "chore: Update converted ML models [skip ci]" || echo "No changes to commit"
          git push

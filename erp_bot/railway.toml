# Railway service for sutra-erp-bot — set Root Directory to `erp_bot` in the dashboard.
# Without that, Nixpacks sees the monorepo root package.json and runs Bun (wrong).
[build]
builder = "NIXPACKS"
# Railway wraps as `chmod +x <cmd> && sh <cmd>` — do not prefix with `bash`
# or chmod targets the word "bash" and the build fails.
buildCommand = "scripts/render-build.sh"

[deploy]
startCommand = "python scripts/start_render.py"
healthcheckPath = "/livez"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

# Railway service for sutra-erp-bot — set Root Directory to `erp_bot` in the dashboard.
# Without that, Nixpacks sees the monorepo root package.json and runs Bun (wrong).
#
# Railway wraps as `chmod +x <cmd> && sh <cmd>` — do not prefix with `bash`.
#
# REQUIRED Variables (see DEPLOYMENT.md):
#   OIP_ENABLED=true
#   OIP_PROVIDER=groq
#   OIP_GROQ_API_KEY=<secret>
#   OIP_AUTH_REQUIRED=true
#   OIP_JWT_SECRET=<secret length>=16>
#   OIP_PROVIDER_RUNTIME_ENABLED=true
#   OIP_ORCHESTRATOR_ENABLED=true
#   OIP_FORCE_STUB_PROVIDERS=false
# Pin PORT=8080 so sutra-erp can reach this service over private DNS at
# http://sutra-erp-bot.railway.internal:8080 without dashboard reference vars.
# Also set Variable PORT=8080 in the Railway dashboard (keeps public edge in sync).

[build]
builder = "NIXPACKS"
buildCommand = "scripts/render-build.sh"

[deploy]
startCommand = "sh -c 'export PORT=8080; exec python scripts/start_render.py'"
healthcheckPath = "/livez"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

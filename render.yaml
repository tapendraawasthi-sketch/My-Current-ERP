services:
  - type: web
    name: sutra-erp
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: "20"
healthCheckPath: /health

services:
  - type: web
    name: sutra-erp
    runtime: node
    branch: main
    autoDeploy: true
    buildCommand: bash scripts/render-build.sh
    startCommand: npm start
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=6144
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: "20"
    healthCheckPath: /health

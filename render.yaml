services:
  - type: web
    name: sutra-erp
    runtime: node
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm start
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: "20"
      # Set when erp_bot + Ollama runs on a separate host (enables e-Khata LLM + Falcon RAG)
      - key: ERP_BOT_BACKEND_URL
        sync: false
    healthCheckPath: /health

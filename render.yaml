services:
  # Python erp_bot — OIP kernel + Groq Provider Runtime (no GPU/Ollama).
  - type: web
    name: sutra-erp-bot
    runtime: python
    branch: main
    autoDeploy: true
    rootDir: erp_bot
    buildCommand: bash scripts/render-build.sh
    startCommand: python scripts/start_render.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: OIP_ENABLED
        value: "true"
      - key: OIP_FORCE_STUB_PROVIDERS
        value: "false"
      - key: OIP_PROVIDER
        value: "groq"
      - key: OIP_GROQ_API_KEY
        sync: false
      - key: OIP_DEFAULT_MODEL
        value: "llama-3.3-70b-versatile"
      - key: OIP_AUTH_REQUIRED
        value: "true"
      - key: OIP_PROVIDER_RUNTIME_ENABLED
        value: "true"
      - key: OIP_ORCHESTRATOR_ENABLED
        value: "true"
      - key: OIP_DATABASE_URL
        value: "sqlite+aiosqlite:///./data/oip/oip.db"
      - key: OIP_DEFAULT_SERVICE_TENANT_ID
        value: ""
      - key: OIP_JWT_SECRET
        sync: false
      - key: API_SECRET_KEY
        sync: false
      - key: ORBIX_NP_KB_ENABLED
        value: "true"
      - key: ORBIX_NP_KB_ROOT
        value: "knowledgebase"
      - key: ORBIX_NP_KB_LEXICAL_ENABLED
        value: "true"
      - key: ORBIX_NP_KB_CITATIONS_ENABLED
        value: "true"

  # Node frontend — SPA + /erp-bot reverse proxy to sutra-erp-bot.
  - type: web
    name: sutra-erp
    runtime: node
    branch: main
    autoDeploy: true
    buildCommand: bash scripts/render-build.sh
    startCommand: npm start
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=6144
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: "20"
      - key: ERP_BOT_BACKEND_URL
        fromService:
          type: web
          name: sutra-erp-bot
          envVarKey: RENDER_EXTERNAL_URL
    healthCheckPath: /health

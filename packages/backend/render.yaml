services:
  # PostgreSQL Database
  - type: pserv
    name: busy-erp-db
    plan: starter
    ipWhitelist: []
    version: 15
    databaseName: busy_erp_prod
    user: busy_admin
    enablePostgresExtensions:
      - uuid-ossp
    backupRetention: 7

  # Redis Cache
  - type: redis
    name: busy-erp-cache
    plan: starter
    ipWhitelist: []
    version: 7
    maxmemoryPolicy: allkeys-lru

  # Node.js API Backend
  - type: web
    name: busy-erp-api
    plan: starter
    runtime: node
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm --filter @busy-erp/backend build &&
      pnpm db:migrate
    startCommand: cd packages/backend && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: busy-erp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: busy-erp-cache
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: API_SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /api/health
    healthCheckInterval: 30
    healthCheckTimeout: 10
    maxInstances: 3
    minInstances: 1
    region: oregon
    disk:
      name: busy-erp-storage
      sizeGB: 10
      mountPath: /app/storage
    autoDeploy: true

databases:
  - name: busy-erp-db
    engine: postgres
    version: 15
    plan: starter

caches:
  - name: busy-erp-cache
    engine: redis
    plan: starter

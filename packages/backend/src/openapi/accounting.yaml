openapi: 3.1.0
info:
  title: BUSY ERP API
  version: 1.0.0
  description: OpenAPI Specification for BUSY ERP Backend Services
servers:
  - url: https://busy-api.onrender.com
    description: Production Server
  - url: http://localhost:3000
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        error:
          $ref: '#/components/schemas/ErrorDetail'
        timestamp:
          type: string
          format: date-time

    ErrorDetail:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        path:
          type: string
        value:
          type: string

security:
  - bearerAuth: []

paths:
  # 1. Company & Auth
  /api/v1/companies:
    post:
      summary: Create company with GST setup
      security:
        - bearerAuth: ["company.add"]
      responses:
        '201':
          description: Company Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/v1/companies/{id}:
    get:
      summary: Read company settings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: ["company.view"]
      responses:
        '200':
          description: OK

  /api/v1/users/login:
    post:
      summary: Authenticate user
      security: [] # Public endpoint
      responses:
        '200':
          description: OK

  /api/v1/users/switch:
    post:
      summary: Switch user without logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

  # 2. Masters
  /api/v1/companies/{id}/masters/accounts:
    post:
      summary: Add account ledger
      security:
        - bearerAuth: ["master.account.add"]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Created
    get:
      summary: List accounts with pagination
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: group_id
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      security:
        - bearerAuth: ["master.account.view"]
      responses:
        '200':
          description: OK

  /api/v1/companies/{id}/masters/accounts/{account_id}:
    patch:
      summary: Modify account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: ["master.account.modify"]
      responses:
        '200':
          description: OK

  /api/v1/companies/{id}/masters/items:
    post:
      summary: Add item
      security:
        - bearerAuth: ["master.item.add"]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Created

  # 3. Vouchers
  /api/v1/companies/{id}/vouchers/{type}/draft:
    post:
      summary: Create draft voucher
      security:
        - bearerAuth: ["voucher.add"]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Created

  /api/v1/companies/{id}/vouchers/{voucher_id}:
    get:
      summary: Retrieve voucher
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: voucher_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    patch:
      summary: Modify draft voucher
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: voucher_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /api/v1/companies/{id}/vouchers/{voucher_id}/hold:
    post:
      summary: Hold voucher (saved but not posted)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: voucher_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /api/v1/companies/{id}/vouchers/{voucher_id}/post:
    post:
      summary: Final save; triggers ledger and inventory postings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: voucher_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /api/v1/companies/{id}/vouchers/{voucher_id}/reverse:
    post:
      summary: Void and auto-create reversal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: voucher_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  # 4. Bill-by-Bill
  /api/v1/companies/{id}/vouchers/{voucher_id}/allocate-bills:
    post:
      summary: Apply bill-by-bill adjustment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: voucher_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /api/v1/companies/{id}/accounts/{account_id}/pending-bills:
    get:
      summary: List open bills for adjustment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  # 5. Reports
  /api/v1/companies/{id}/reports/balance-sheet:
    get:
      summary: Balance Sheet tree
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: from_date
          in: query
          schema:
            type: string
        - name: to_date
          in: query
          schema:
            type: string
      security:
        - bearerAuth: ["report.balancesheet"]
      responses:
        '200':
          description: OK

  /api/v1/companies/{id}/reports/trial-balance:
    get:
      summary: Trial Balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
      security:
        - bearerAuth: ["report.trialbalance"]
      responses:
        '200':
          description: OK

  /api/v1/companies/{id}/reports/ledger/{account_id}:
    get:
      summary: Account Ledger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          schema:
            type: string
        - name: from_date
          in: query
          schema:
            type: string
        - name: to_date
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK

  /api/v1/companies/{id}/reports/outstanding:
    get:
      summary: Outstanding Analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: party_id
          in: query
          schema:
            type: string
        - name: scope
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK

  /api/v1/companies/{id}/reports/ageing:
    get:
      summary: Ageing Analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: as_on_date
          in: query
          schema:
            type: string
        - name: slabs
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK

  /api/v1/companies/{id}/reports/interest-calculation:
    get:
      summary: Interest Calculation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: query
          schema:
            type: string
        - name: rate
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK

  /api/v1/companies/{id}/reports/stock-status:
    get:
      summary: Stock Status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: as_on_date
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK

  # 6. GST Integration
  /api/v1/companies/{id}/e-invoice/generate:
    post:
      summary: Generate E-Invoice (call NIC API via GSP)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: ["gst.einvoice"]
      responses:
        '200':
          description: OK

  /api/v1/companies/{id}/eway-bill/generate:
    post:
      summary: Generate E-Way Bill (call EWB API)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: ["gst.ewaybill"]
      responses:
        '200':
          description: OK

  /api/v1/companies/{id}/gst-reports/gstr-1:
    get:
      summary: GSTR-1 JSON export
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: period
          in: query
          schema:
            type: string
      security:
        - bearerAuth: ["gst.gstr1"]
      responses:
        '200':
          description: OK

  # 7. Utilities
  /api/v1/companies/{id}/backup:
    post:
      summary: Trigger S3 backup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: ["admin.backup"]
      responses:
        '200':
          description: OK

  /api/v1/companies/{id}/fiscal-year/split:
    post:
      summary: Create new FY with carried-forward balances
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: ["admin.fysplit"]
      responses:
        '200':
          description: OK
